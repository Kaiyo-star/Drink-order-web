<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drink Orders</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="panel">
        <div class="panel-header">
          <div>
            <span class="eyebrow">Quick Drink Order</span>
            <h1>Pilih minuman anda</h1>
            <p class="panel-subtitle">
              Tekan + atau - untuk pilih bilangan minuman, kemudian tekan Next.
            </p>
          </div>
        </div>

        <div class="step-indicator">
          <div class="step-pill active" id="stepPillOne">1. Pilih Minuman</div>
          <div class="step-pill" id="stepPillTwo">2. Maklumat</div>
        </div>

        <form id="orderForm" novalidate>
          <div id="stepOne">
            <div id="drinkCards" class="menu-grid"></div>

            <div class="summary-bar">
              <div>
                <span class="summary-label">Total Order</span>
                <strong class="summary-value" id="cartTotalAmount"
                  >RM 0.00</strong
                >
              </div>
              <button class="primary-btn" type="button" id="nextStepBtn">
                Next
              </button>
            </div>
          </div>

          <div id="stepTwo" style="display: none; margin-top: 20px">
            <div class="form-grid">
              <div class="field">
                <label for="roomNumber">No. Bilik</label>
                <input
                  id="roomNumber"
                  name="roomNumber"
                  type="text"
                  required
                  placeholder="Masukkan no. bilik"
                />
              </div>
            </div>

            <div class="summary-bar">
              <div>
                <span class="summary-label">Jumlah Bayaran</span>
                <strong class="summary-value" id="finalTotalAmount"
                  >RM 0.00</strong
                >
              </div>
              <div class="action-row" style="margin-top: 0">
                <button class="secondary-btn" type="button" id="backStepBtn">
                  Back
                </button>
                <button class="primary-btn" type="submit">Submit</button>
              </div>
            </div>
          </div>

          <p id="statusText" class="status-text" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/main.js"></script>
  </body>
</html>
